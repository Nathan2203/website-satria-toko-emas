<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satria Toko Emas — Harga Emas Hari Ini</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <main class="display">
    <!-- Banner / Foto berpindah -->
    <section class="banner">
      <div class="banner-track" id="bannerTrack"></div>
      <div class="banner-dots" id="bannerDots"></div>
    </section>

    <!-- Harga Emas -->
    <section class="prices">
      <!-- .prices-inner diskalakan otomatis oleh app.js (fitPrices) agar SELALU
           muat di layar tanpa scroll, berapa pun jumlah baris kadar. -->
      <div class="prices-inner" id="pricesInner">
        <header class="prices-head">
          <!-- Logo asli client, tidak dimodifikasi. Background maroon dari CSS. -->
          <div class="logo-badge">
            <img src="/logo.png" alt="Satria Toko Emas" class="brand-logo" />
          </div>
          <h1>HARGA EMAS</h1>
          <div class="today-badge">HARGA HARI INI</div>
          <div class="clock" id="clock"></div>
        </header>

        <table class="price-table">
          <thead>
            <tr><th>KADAR</th><th>Harga Beli</th><th>Harga Jual</th></tr>
          </thead>
          <tbody id="priceBody"></tbody>
        </table>

        <button class="chart-toggle" id="chartToggle">Lihat Grafik Harga</button>
        <p class="note">*Harga berlaku untuk transaksi hari ini &amp; dapat berubah sewaktu-waktu</p>
      </div>
    </section>
  </main>

  <!-- Chart modal -->
  <div class="modal" id="chartModal">
    <div class="modal-box">
      <div class="modal-head">
        <h2>Grafik Harga Emas</h2>
        <select id="chartKarat"></select>
        <button id="chartClose">&times;</button>
      </div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
